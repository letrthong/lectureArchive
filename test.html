<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Trình Chiếu Bài Giảng</title>
    <!-- Tải Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Cấu hình Tailwind để hỗ trợ Dark Mode dựa trên class
        tailwind.config = {
            darkMode: 'class', // Bật dark mode theo class 'dark'
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'primary': '#0D9488', // Teal 600 - Xanh Ngọc Bích đậm
                        'secondary': '#14B8A6', // Teal 500 - Xanh Ngọc Bích nhạt hơn
                    }
                }
            }
        }
    </script>
    <style>
        /* CSS cho chế độ SÁNG */
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, color 0.3s;
            padding-bottom: 7rem; 
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        .main-content-container {
            background-color: #ffffff; /* bg-white */
            color: #1f2937; /* text-gray-800 */
        }
        /* Các slide sections */
        #slide-title { color: #4b5563; } /* text-gray-600 */
        #slide-detail { color: #4b5563; } /* text-gray-700 */
        .bg-primary-10 { background-color: #d1f7f5; } /* bg-primary/10 */
        .slide-note-bg { background-color: #f9fafb; border-color: #e5e7eb; } /* bg-gray-50, border-gray-200 */
        .secondary-block-even { background-color: #f9fafb; } /* bg-gray-50 */
        .secondary-block-odd { background-color: #ffffff; } /* bg-white */
        

        /* CSS cho chế độ TỐI (Khi body có class 'dark') */
        .dark body {
            background-color: #1f2937; /* bg-gray-800 */
        }
        .dark .main-content-container {
            background-color: #374151; /* bg-gray-700 */
            color: #d1d5db; /* text-gray-300 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
        }
        /* Các slide sections trong Dark Mode */
        .dark #slide-title { color: #e5e7eb; } /* text-gray-200 */
        .dark #slide-detail { color: #d1d5db; } /* text-gray-300 */
        .dark .bg-primary-10 { background-color: #0d4440; } /* Darker primary background */
        .dark .slide-note-bg { background-color: #4b5563; border-color: #6b7280; } /* Darker notes background */
        .dark .secondary-block-even { background-color: #4b5563; } /* Darker block background */
        .dark .secondary-block-odd { background-color: #374151; } /* Darker block background */
        .dark .text-gray-700 { color: #d1d5db; } /* Adjusting text colors inside blocks */
        .dark .text-gray-600 { color: #d1d5db; }
        .dark .text-gray-800 { color: #f3f4f6; }


        /* --- Style chung --- */
        #file-upload { display: none; }
        #slide-detail { max-height: 40vh; overflow-y: auto; padding-right: 0.5rem; }
        #reference-image, .imageBase64 { max-w-full; max-height: 40vh; object-fit: contain; }
        .modal-overlay { z-index: 1000; }
        .main-content-container { padding-bottom: 7rem; }
        .nav-button { width: 3.5rem; height: 3.5rem; font-size: 1.5rem; }
        .nav-icon-bg-dark {
            background-color: rgba(13, 148, 136, 0.95); 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        }
        .dark .nav-icon-bg-dark {
             background-color: rgba(30, 41, 59, 0.95); /* Slate 800 - dark background for icon */
             color: #14B8A6; /* Secondary color for icons in dark mode */
        }
        .dark .nav-icon-bg-dark:hover {
             background-color: rgba(55, 65, 81, 0.95); /* Darker hover */
        }
        
        /* Đảm bảo nút reset đỏ nổi bật trong Dark Mode */
        .dark #setup-button {
             background-color: #dc2626 !important; /* Red 600 */
        }
        
        /* Style cho Slide Counter */
        #slide-counter {
            background-color: rgba(255, 255, 255, 0.9);
            color: #0D9488;
            padding: 0.5rem 1rem;
            border-radius: 9999px; /* rounded-full */
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .dark #slide-counter {
            background-color: rgba(55, 65, 81, 0.9); /* Darker background */
            color: #14B8A6; /* Secondary color */
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 sm:p-8 flex flex-col items-center">

    <!-- Thẻ chứa chính (Đã thêm class main-content-container để điều chỉnh khoảng đệm) -->
    <div class="w-full max-w-4xl bg-white shadow-xl rounded-2xl p-1 sm:p-10 space-y-6 pb-20 main-content-container">

        <!-- Khu vực Tải File & Bắt Đầu -->
        <div id="setup-area" class="hidden flex flex-col items-center justify-center space-y-4 pt-6 pb-6 border-b border-gray-200">
            <h1 class="text-3xl font-bold text-primary text-center">Trình Chiếu Bài Giảng</h1>
            <p class="text-center text-gray-500">Tải lên file JSON hoặc sử dụng dữ liệu mẫu để bắt đầu.</p>
            <div class="flex flex-col sm:flex-row items-center justify-center space-y-4 sm:space-y-0 sm:space-x-4">
                
                <!-- Nút Tải File -->
                <label for="file-upload" class="file-input-label flex items-center justify-center px-6 py-3 bg-primary text-white font-semibold rounded-full shadow-lg hover:shadow-xl focus:outline-none focus:ring-4 focus:ring-primary/50 transition transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L10 11.586l1.293-1.293a1 1 0 111.414 1.414l-2 2a1 1 0 01-1.414 0l-2-2a1 1 0 010-1.414z" clip-rule="evenodd" />
                        <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v7a1 1 0 11-2 0V3a1 1 0 011-1z" clip-rule="evenodd" />
                    </svg>
                    <span id="file-status">Chọn File JSON</span>
                </label>
                <input type="file" id="file-upload" accept=".json">
                
                <!-- Nút Bắt Đầu với Dữ liệu Mẫu -->
                <button id="start-mock-button" class="flex items-center justify-center px-6 py-3 bg-gray-600 text-white font-semibold rounded-full shadow-lg hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-500/50 transition transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2a1 1 0 000-1.414z" clip-rule="evenodd" />
                    </svg>
                    Bắt Đầu (Dữ liệu mẫu)
                </button>

                <!-- Trạng thái tải -->
                <span id="loading-status" class="text-sm text-gray-500 hidden">Đang tải và xử lý...</span>
            </div>
        </div>

        <!-- Khu vực Hiển thị Slide -->
        <div id="presentation-area" class="hidden">
            
            <!-- 1. Thông tin Slide (Chỉ còn TITLE) -->
            <div class="mb-6 p-4 bg-primary/10 rounded-xl bg-primary-10">
                <h2 id="slide-title" class="text-xl font-extrabold text-gray-600"></h2> 
            </div>

            <!-- 2. Nội dung chi tiết (DETAIL) -->
            <div id="slide-detail" class="text-base text-gray-700 leading-relaxed">
                <!-- Nội dung chi tiết sẽ được chèn vào đây -->
            </div>
            
            <!-- 3. Khu vực Hiển thị Hình ảnh Tham chiếu (referenceImagesBase64) -->
            <div id="slide-image-container" class="mt-6 pt-1 border-t border-gray-200 hidden">
                <img id="reference-image" class="max-w-full h-auto rounded-lg shadow-xl mx-auto border border-gray-200" alt="Hình ảnh tham chiếu của slide">
            </div>

            <!-- 4. Khu vực Hiển thị Ghi chú cấp cao nhất (NOTES) -->
            <div id="slide-notes-container" class="mt-6 p-1 border border-gray-200 rounded-lg hidden slide-note-bg">
                <p id="slide-notes" class="text-sm text-gray-600 italic whitespace-pre-wrap"></p>
            </div>

            <!-- 5. Khu vực Hiển thị Các Khối Nội dung Bổ sung (ADDITIONAL BLOCKS) -->
            <div id="secondary-blocks-container" class="mt-8 pt-1 border-t border-gray-200">
                <h3 class="text-xl font-bold text-gray-800 mb-4 hidden" id="secondary-blocks-title">Nội dung Bổ sung:</h3>
                <!-- Các block con sẽ được chèn vào đây bởi JS -->
            </div>

            <!-- Khu vực thông báo lỗi -->
            <div id="error-message" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg hidden"></div>
        </div>

    </div>
    
    <!-- Thanh Điều Hướng (Navigation) CỐ ĐỊNH Ở DƯỚI CÙNG MÀN HÌNH (Trong suốt) -->
    <div id="nav-controls" class="hidden fixed bottom-0 inset-x-0 w-full z-50 py-3 pointer-events-none">
        <div class="max-w-4xl mx-auto flex justify-between items-center px-6 pointer-events-auto">
            
            <!-- Vị trí 1: BÊN TRÁI: Tải Lại (Setup) / Trước (Prev) & Dark Mode Toggle -->
            <div class="flex items-center space-x-3">
                <div class="relative w-14 h-14"> 
                    <!-- Nút Tải Lại/Setup (Icon - Đổi màu nổi bật cho Reset) -->
                    <button id="setup-button" title="Quay lại màn hình Tải file" class="nav-button absolute inset-0 flex items-center justify-center p-3 bg-red-500 text-white rounded-full shadow-lg hover:bg-red-600 transition transform active:scale-95 disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed hidden">
                        <!-- Icon Tải lại / Refresh -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.836 5l.002.002M20.354 15.354A9 9 0 0112 21v2a11 11 0 008.354-3.646l-2.002-2.002zM3.646 8.646A9 9 0 0112 3v-2a11 11 0 00-8.354 3.646l2.002 2.002z" />
                        </svg>
                    </button>
                    <!-- Nút Trước (Icon) -->
                    <button id="prev-button" title="Slide Trước" class="nav-button absolute inset-0 flex items-center justify-center p-3 nav-icon-bg-dark text-white rounded-full shadow-lg hover:opacity-80 transition transform active:scale-95 disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed">
                        <!-- Chevron trái -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>

                <!-- Nút Dark Mode -->
                <button id="dark-mode-toggle" title="Chế độ Sáng/Tối" class="nav-button flex items-center justify-center p-3 nav-icon-bg-dark text-white rounded-full shadow-lg hover:opacity-80 transition transform active:scale-95">
                    <!-- Icon Mặt Trời / Mặt Trăng (sẽ được cập nhật bằng JS) -->
                    <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                         <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </button>
            </div>
            
            <!-- Vị trí 2: TRUNG TÂM: Chỉ số Slide -->
            <span id="slide-counter" class="text-xl font-bold rounded-full hidden">
                <!-- Nội dung Trang X/Y sẽ được cập nhật bằng JS -->
            </span>
            
            <!-- Vị trí 3: BÊN PHẢI: Menu và Next -->
            <div class="flex items-center space-x-3">
                 <!-- Nút Index/Menu -->
                <button id="index-button" title="Mục lục Slide" class="nav-button flex items-center justify-center p-3 nav-icon-bg-dark text-white rounded-full shadow-lg hover:opacity-80 transition transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd" />
                    </svg>
                </button>

                <!-- Nút Tiếp (Next) -->
                <button id="next-button" title="Slide Tiếp" class="nav-button flex items-center justify-center p-3 nav-icon-bg-dark text-white rounded-full shadow-lg hover:opacity-80 transition transform active:scale-95 disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed">
                    <!-- Chevron phải -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Modal Chỉ mục Slide (Slide Index Modal) -->
    <div id="slide-index-modal" class="modal-overlay hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md lg:max-w-lg max-h-[90vh] flex flex-col">
            
            <!-- Header Modal -->
            <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-primary rounded-t-xl">
                <h3 class="text-2xl font-bold text-white">Mục Lục Slide</h3>
                <button id="modal-close-button" class="text-white hover:text-gray-200 transition p-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <!-- Khu vực Tìm kiếm MỚI -->
            <div class="p-4 border-b border-gray-100">
                <input type="text" id="slide-search-input" placeholder="Tìm kiếm tiêu đề hoặc nội dung slide..." 
                       class="w-full p-3 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary transition" />
            </div>

            <!-- Danh sách Slide (Có thể cuộn) -->
            <div class="p-4 overflow-y-auto flex-grow">
                <ul id="slide-list-container" class="space-y-2">
                    <!-- Danh sách slide sẽ được chèn vào đây bằng JS -->
                </ul>
                <p id="no-results-message" class="hidden text-center text-gray-500 italic pt-4">Không tìm thấy slide nào khớp.</p>
            </div>
        </div>
    </div>


    <!-- JavaScript logic -->
    <script>
        // Khai báo các biến toàn cục
        let slideData = []; 
        let currentSlideIndex = 0; 

        // Dữ liệu mẫu (Mock data)
        const MOCK_SLIDE_DATA = [
            {
                // SLIDE 1: Cấu trúc mô phỏng file upload (chỉ chứa các trường bắt buộc)
                "id": "mock-001",
                "page": 1,
                "template": "1",
                "title": "Slide Mẫu 1: Nội dung chi tiết ngắn gọn",
                // Đảm bảo nội dung mẫu này không chứa thẻ HTML
                "detail": "Nội dung chi tiết của slide này rất ngắn. Đây là template 1 (cơ bản) với Title, Detail, và Image chính. Dù ngắn nhưng vẫn cần font rõ ràng.",
                // 1x1 transparent GIF placeholder - Giả lập imageBase64 có tồn tại
                "referenceImagesBase64": "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7", 
                // Không thêm notes và blocks để mô phỏng file gốc
            },
            {
                // SLIDE 2: Minh họa nội dung chi tiết rất dài, cần cuộn
                "id": "mock-002",
                "page": 2,
                "template": "1", 
                "title": "Slide Mẫu 2: Kiểm tra chức năng cuộn nội dung",
                // CHÚ Ý: Nội dung chi tiết được làm sạch để không có định dạng in đậm không mong muốn.
                "detail": "Nội dung chi tiết rất dài nhằm mục đích kiểm tra CSS max-height và overflow-y: auto.\n\nKiểm tra cuộn dọc 1: Tất cả chữ cái đều theo một chuẩn font và không bị in đậm ngẫu nhiên.\n\nKiểm tra cuộn dọc 2: Chúng ta đang sử dụng font 'Inter' với độ dày (weight) tiêu chuẩn (regular/400) cho nội dung chi tiết.\n\nKiểm tra cuộn dọc 3.\n\nKiểm tra cuộn dọc 4.",
                "referenceImagesBase64": "", // Slide này không có ảnh tham chiếu chính
                
                "blocks": [
                    {
                        // Khối 1
                        "order": 1,
                        "notes": "Khối A: Nội dung quan trọng", 
                        "imageBase64": "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7", 
                        "content": [
                            { "order": 1, "text": "Đây là mục 1 của Khối A." },
                            { "order": 2, "text": "Đây là mục 2 của Khối A." }
                        ]
                    }
                ]
            },
            {
                // SLIDE 3: Minh họa Nội dung Bổ sung và Ghi chú (Đã thêm notes để kiểm tra theo yêu cầu)
                "id": "mock-003",
                "page": 3,
                "template": "1", 
                "title": "Slide Mẫu 3: Minh họa Nội dung Bổ sung và Ghi chú",
                "detail": "Nội dung Detail vẫn được hiển thị. Đây là nội dung chi tiết ngắn gọn cho slide này.",
                // SỬ DỤNG CHUỖI NOTES CỦA NGƯỜI DÙNG ĐỂ XÁC MINH RẰNG CODE CHẮN CHẮN HỢP LỆ
                "notes": "Đây là ghi chú chi tiết dành cho người trình bày.", 
                "referenceImagesBase64": "",
                "blocks": [
                    {
                        "order": 1,
                        "notes": "Điểm nổi bật A",
                        "content": [{ "order": 1, "text": "Mục tiêu 1" }, { "order": 2, "text": "Mục tiêu 2" }]
                    },
                    {
                        "order": 2,
                        "notes": "Điểm nổi bật B",
                        "content": [{ "order": 1, "text": "Tính năng X" }, { "order": 2, "text": "Tính năng Y" }]
                    }
                ]
            }
        ];

        // Lấy các phần tử DOM
        const fileUpload = document.getElementById('file-upload');
        const fileStatus = document.getElementById('file-status');
        const setupArea = document.getElementById('setup-area');
        const presentationArea = document.getElementById('presentation-area');
        const navControls = document.getElementById('nav-controls');
        const prevButton = document.getElementById('prev-button');
        const nextButton = document.getElementById('next-button');
        const slideTitle = document.getElementById('slide-title');
        const slideDetail = document.getElementById('slide-detail');
        const slideCounter = document.getElementById('slide-counter'); 
        const referenceImage = document.getElementById('reference-image'); 
        const slideImageContainer = document.getElementById('slide-image-container'); 
        const slideNotes = document.getElementById('slide-notes'); 
        const slideNotesContainer = document.getElementById('slide-notes-container'); 
        const secondaryBlocksContainer = document.getElementById('secondary-blocks-container'); 
        const secondaryBlocksTitle = document.getElementById('secondary-blocks-title'); 
        const errorMessage = document.getElementById('error-message');
        const loadingStatus = document.getElementById('loading-status'); 
        const startMockButton = document.getElementById('start-mock-button'); 
        const setupButton = document.getElementById('setup-button'); 
        
        // CÁC PHẦN TỬ CHO CHỈ MỤC SLIDE VÀ TÌM KIẾM
        const indexButton = document.getElementById('index-button'); 
        const slideIndexModal = document.getElementById('slide-index-modal'); 
        const modalCloseButton = document.getElementById('modal-close-button'); 
        const slideListContainer = document.getElementById('slide-list-container'); 
        const slideSearchInput = document.getElementById('slide-search-input'); 
        const noResultsMessage = document.getElementById('no-results-message'); 
        
        // DARK MODE
        const darkModeToggle = document.getElementById('dark-mode-toggle'); 
        const themeIcon = document.getElementById('theme-icon'); 
        let isDarkMode = false; // Theo dõi trạng thái

        /**
         * @function updateThemeIcon
         * @description Cập nhật icon theme dựa trên trạng thái Dark Mode hiện tại.
         */
        function updateThemeIcon() {
            if (isDarkMode) {
                // Icon: Mặt Trăng (Dark)
                themeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                `;
            } else {
                // Icon: Mặt Trời (Light)
                themeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                `;
            }
        }
        
        /**
         * @function applyTheme
         * @description Áp dụng class 'dark' cho thẻ html và cập nhật biến trạng thái.
         * @param {boolean} darkState - true nếu là Dark Mode, false nếu là Light Mode.
         */
        function applyTheme(darkState) {
            isDarkMode = darkState;
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateThemeIcon();
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        }

        /**
         * @function initializeTheme
         * @description Kiểm tra localStorage và áp dụng theme đã lưu, mặc định là Light Mode.
         */
        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme');
            
            if (savedTheme === 'dark') {
                applyTheme(true);
            } else {
                // Mặc định là Light Mode (hoặc savedTheme là 'light')
                applyTheme(false); 
            }
        }
        
        /**
         * @function toggleDarkMode
         * @description Chuyển đổi giữa chế độ sáng và tối và lưu vào localStorage.
         */
        function toggleDarkMode() {
            // Chuyển đổi trạng thái hiện tại
            applyTheme(!isDarkMode); 
        }

        /**
         * @function removeAccents
         * @description Loại bỏ dấu (diacritics) khỏi chuỗi tiếng Việt, đồng thời chuyển về chữ thường.
         * @param {string} str - Chuỗi cần xử lý.
         * @returns {string} - Chuỗi không dấu và chữ thường.
         */
        function removeAccents(str) {
            if (!str) return '';
            str = str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            str = str.replace(/đ/g, "d").replace(/Đ/g, "D");
            return str.toLowerCase();
        }

        /**
         * @function displayError
         * @description Hiển thị thông báo lỗi cho người dùng.
         * @param {string} message - Nội dung lỗi.
         */
        function displayError(message) {
            errorMessage.textContent = `Lỗi: ${message}`;
            errorMessage.classList.remove('hidden');
            console.error(message);
        }

        /**
         * @function hideError
         * @description Ẩn thông báo lỗi.
         */
        function hideError() {
            errorMessage.classList.add('hidden');
        }

        /**
         * @function clearSlideContent
         * @description Dọn dẹp tất cả các khu vực nội dung (Detail, Image, Notes, Blocks) và đảm bảo chúng được hiển thị.
         */
        function clearSlideContent() {
            slideDetail.innerHTML = '';
            slideDetail.classList.remove('hidden'); 
            referenceImage.src = '';
            slideImageContainer.classList.add('hidden');
            slideNotes.textContent = '';
            slideNotesContainer.classList.add('hidden');
            secondaryBlocksContainer.innerHTML = '';
            secondaryBlocksTitle.classList.add('hidden');
        }


        /**
         * @function renderBlocks
         * @description Hiển thị các khối nội dung bổ sung (blocks) theo logic luân phiên màu nền.
         * @param {Object} slide - Đối tượng slide hiện tại.
         */
        function renderBlocks(slide) {
            secondaryBlocksContainer.innerHTML = ''; 
            const additionalBlocks = slide.blocks; 
            
            if (Array.isArray(additionalBlocks) && additionalBlocks.length > 0) {
                secondaryBlocksTitle.classList.remove('hidden');
                
                additionalBlocks.forEach((block, index) => {
                    const blockDiv = document.createElement('div');
                    
                    // Logic TÔ MÀU LUÂN PHIÊN - Sử dụng class cho SÁNG/TỐI
                    const alternatingBgClass = index % 2 === 0 ? 'secondary-block-even' : 'secondary-block-odd'; 
                    blockDiv.className = `p-5 mb-6 rounded-xl space-y-3 shadow-sm ${alternatingBgClass}`;
                    
                    let headerText = '';
                    if (block.notes && block.notes.trim().length > 0) {
                        headerText = block.notes.trim();
                    } else {
                        const hasVisibleContent = (block.content && (Array.isArray(block.content) ? block.content.some(c => c.text && c.text.trim().length > 0) : block.content.trim().length > 0)) || (block.imageBase64 && block.imageBase64.trim().length > 0);
                        if (hasVisibleContent) {
                            headerText = `Khối Nội dung Bổ sung ${index + 1}`;
                        }
                    }

                    if (headerText) {
                        const blockHeader = document.createElement('h4');
                        blockHeader.className = 'text-lg font-bold text-gray-800'; 
                        blockHeader.textContent = headerText;
                        blockDiv.appendChild(blockHeader);
                        
                        if ((block.content && block.content.length > 0) || block.imageBase64) {
                            const divider = document.createElement('div');
                            // Đường phân cách sẽ tự đổi màu nhờ CSS Dark Mode
                            divider.className = `border-t border-gray-200 mt-2 pt-3`; 
                            blockDiv.appendChild(divider);
                        }
                    }
                    
                    if (block.content) {
                        if (Array.isArray(block.content)) {
                            const sortedContent = block.content.sort((a, b) => (a.order || 0) - (b.order || 0));
                            
                            let contentContainer = document.createElement('div');
                            contentContainer.className = 'space-y-1'; 

                            let hasContentItems = false;
                            
                            sortedContent.forEach(item => {
                                if (item.text && item.text.trim().length > 0) {
                                    const p = document.createElement('p');
                                    p.className = 'text-base text-gray-700'; 
                                    p.textContent = item.text; 
                                    contentContainer.appendChild(p);
                                    hasContentItems = true;
                                }
                            });
                            
                            if (hasContentItems) {
                                blockDiv.appendChild(contentContainer);
                            }
                            
                        } else if (typeof block.content === 'string' && block.content.trim().length > 0) {
                            const contentP = document.createElement('p');
                            contentP.className = 'text-base text-gray-700';
                            contentP.textContent = block.content;
                            contentP.innerHTML = contentP.textContent.replace(/\n/g, '<br>');
                            blockDiv.appendChild(contentP);
                        }
                    }

                    if (block.imageBase64 && block.imageBase64.trim().length > 0) {
                        const img = document.createElement('img');
                        img.className = 'max-w-full h-auto rounded-lg shadow-md mx-auto mt-2 border border-gray-300 imageBase64';
                        img.src = block.imageBase64;
                        img.alt = `Hình ảnh khối bổ sung ${index + 1}`;
                        blockDiv.appendChild(img);
                    }
                    
                    secondaryBlocksContainer.appendChild(blockDiv);
                });
            } else {
                secondaryBlocksTitle.classList.add('hidden');
            }
        }

        /**
         * @function renderDefaultContent
         * @description Hiển thị Detail, Image và Notes theo cấu trúc mặc định.
         * @param {Object} slide - Đối tượng slide hiện tại.
         */
        function renderDefaultContent(slide) {
            let detailContent = slide.detail || "Không có nội dung chi tiết.";
            slideDetail.classList.remove('hidden');

            slideDetail.innerHTML = ''; 
            
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = detailContent;
            const cleanText = tempDiv.textContent || tempDiv.innerText || detailContent;
            
            const paragraphs = cleanText.split('\n\n').map(p => p.trim()).filter(p => p.length > 0);
            
            if (paragraphs.length > 0) {
                paragraphs.forEach(paragraph => {
                    const p = document.createElement('p');
                    p.className = 'text-base text-gray-700 mb-3 font-normal'; 
                    p.innerHTML = paragraph.replace(/\n/g, '<br>'); 
                    slideDetail.appendChild(p);
                });
            } else {
                 const p = document.createElement('p');
                 p.className = 'text-base text-gray-700 font-normal italic';
                 p.textContent = "Không có nội dung chi tiết.";
                 slideDetail.appendChild(p);
            }

            const base64Image = slide.referenceImagesBase64;
            
            if (base64Image && base64Image.trim().length > 0) {
                referenceImage.src = base64Image;
                slideImageContainer.classList.remove('hidden');
            } else {
                referenceImage.src = ''; 
                slideImageContainer.classList.add('hidden'); 
            }

            const notesContent = slide.notes;
            
            if (notesContent && notesContent.trim().length > 0) {
                slideNotes.textContent = notesContent;
                slideNotesContainer.classList.remove('hidden');
            } else {
                slideNotes.textContent = ''; 
                slideNotesContainer.classList.add('hidden'); 
            }
        }
        
        /**
         * @function renderSlide
         * @description Cập nhật giao diện với nội dung của slide hiện tại.
         */
        function renderSlide() {
            if (slideData.length === 0) return;
            hideError();
            clearSlideContent(); 

            const slide = slideData[currentSlideIndex];
            
            // 1. Cập nhật Tiêu đề 
            slideTitle.textContent = slide.title || "(Không có Tiêu đề)";
            
            // 2. Cập nhật Chỉ số Slide
            slideCounter.textContent = `Trang ${currentSlideIndex + 1} / ${slideData.length}`;
            slideCounter.classList.remove('hidden');

            // 3. Cập nhật trạng thái của các nút điều hướng
            nextButton.disabled = currentSlideIndex === slideData.length - 1;

            if (currentSlideIndex === 0) {
                prevButton.classList.add('hidden');
                setupButton.classList.remove('hidden');
            } else {
                prevButton.classList.remove('hidden');
                setupButton.classList.add('hidden');
            }
            
            // 4. Hiển thị nội dung
            renderDefaultContent(slide); 
            renderBlocks(slide);

            prevButton.disabled = currentSlideIndex === 0; 
        }

        /**
         * @function renderSlideIndex
         * @description Tạo danh sách tất cả các slide trong modal mục lục.
         * @param {Array<Object>} slidesToRender - Danh sách slide đã lọc.
         */
        function renderSlideIndex(slidesToRender) {
            slideListContainer.innerHTML = ''; 
            
            if (slidesToRender.length === 0) {
                noResultsMessage.classList.remove('hidden');
                return;
            }

            noResultsMessage.classList.add('hidden');

            slidesToRender.forEach(item => {
                const indexInSlideData = slideData.findIndex(s => s.id === item.id);
                if (indexInSlideData === -1) return; 

                const listItem = document.createElement('li');
                listItem.className = 'p-3 rounded-lg cursor-pointer transition duration-200 flex justify-between items-center shadow-sm';
                listItem.setAttribute('data-index', indexInSlideData);
                
                // Đánh dấu slide hiện tại và điều chỉnh cho Dark Mode
                if (indexInSlideData === currentSlideIndex) {
                    listItem.classList.add('bg-primary/10', 'border-l-4', 'border-primary', 'font-bold');
                    listItem.classList.remove('bg-white', 'hover:bg-gray-50');
                    if (isDarkMode) {
                         listItem.classList.add('dark:bg-gray-600', 'dark:text-white', 'dark:border-secondary');
                         listItem.classList.remove('bg-primary/10');
                    }
                } else {
                    listItem.classList.add('bg-white', 'hover:bg-gray-50');
                    if (isDarkMode) {
                        listItem.classList.add('dark:bg-gray-700', 'dark:text-gray-200', 'dark:hover:bg-gray-600');
                        listItem.classList.remove('bg-white', 'hover:bg-gray-50');
                    }
                }
                
                const pageNum = item.page !== undefined ? item.page : (indexInSlideData + 1);
                listItem.innerHTML = `
                    <span class="text-gray-800 dark:text-gray-200 truncate">${item.title || `(Không có Tiêu đề - Trang ${pageNum})`}</span>
                    <span class="text-sm text-primary font-semibold">Trang ${pageNum} / ${slideData.length}</span>
                `;

                listItem.addEventListener('click', () => {
                    jumpToSlide(indexInSlideData);
                    slideIndexModal.classList.add('hidden'); 
                    slideSearchInput.value = ''; 
                });

                slideListContainer.appendChild(listItem);
            });
        }
        
        /**
         * @function filterSlides
         * @description Lọc danh sách slide dựa trên từ khóa tìm kiếm, có hỗ trợ gõ không dấu.
         */
        function filterSlides() {
            const normalizedSearchTerm = removeAccents(slideSearchInput.value.trim());
            
            if (!normalizedSearchTerm) {
                renderSlideIndex(slideData); 
                return;
            }

            const filteredSlides = slideData.filter(slide => {
                const normalizedTitle = removeAccents(slide.title || '');
                const normalizedDetail = removeAccents(slide.detail || '');

                const titleMatch = normalizedTitle.includes(normalizedSearchTerm);
                const detailMatch = normalizedDetail.includes(normalizedSearchTerm);
                
                return titleMatch || detailMatch;
            });

            renderSlideIndex(filteredSlides);
        }

        /**
         * @function jumpToSlide
         * @description Điều hướng đến một slide cụ thể theo chỉ mục.
         * @param {number} index - Chỉ mục của slide.
         */
        function jumpToSlide(index) {
            if (index >= 0 && index < slideData.length) {
                currentSlideIndex = index;
                renderSlide();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }


        /**
         * @function showSetupScreen
         * @description Hiển thị màn hình thiết lập và ẩn màn hình trình chiếu.
         */
        function showSetupScreen() {
            presentationArea.classList.add('hidden');
            navControls.classList.add('hidden');
            setupArea.classList.remove('hidden');
            slideData = []; 
            currentSlideIndex = 0;
            fileStatus.textContent = "Chọn File JSON";
            slideCounter.classList.add('hidden'); // Ẩn counter
        }
        
        /**
         * @function loadMockData
         * @description Tải dữ liệu mẫu vào slideData và bắt đầu trình chiếu.
         */
        function loadMockData() {
            slideData = MOCK_SLIDE_DATA.map((slide, index) => ({
                ...slide,
                id: slide.id || `auto-id-${index}` 
            }));
            currentSlideIndex = 0;
            startPresentation();
            hideError();
        }

        /**
         * @function handleFileUpload
         * @description Xử lý sự kiện tải file JSON.
         */
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            fileStatus.textContent = `Đã chọn: ${file.name}`;
            loadingStatus.classList.remove('hidden'); 
            
            const reader = new FileReader();
            reader.onload = function(e) {
                loadingStatus.classList.add('hidden'); 
                try {
                    const jsonContent = JSON.parse(e.target.result);
                    
                    if (!Array.isArray(jsonContent) || jsonContent.length === 0) {
                        displayError("File JSON không hợp lệ. Vui lòng đảm bảo nó là một mảng các đối tượng slide.");
                        return;
                    }

                    slideData = jsonContent.map((slide, index) => ({
                        ...slide,
                        id: slide.id || `auto-id-${index}` 
                    }));
                    currentSlideIndex = 0;
                    
                    startPresentation(); 
                    hideError();
                } catch (error) {
                    displayError(`Lỗi phân tích JSON (JSON Syntax Error): Vui lòng kiểm tra cú pháp file JSON của bạn. Chi tiết lỗi: ${error.message}`);
                    fileStatus.textContent = "Chọn File JSON";
                }
            };
            
            reader.onerror = function() {
                loadingStatus.classList.add('hidden'); 
                displayError("Không thể đọc file.");
                fileStatus.textContent = "Chọn File JSON";
            };

            reader.readAsText(file);
        }

        /**
         * @function startPresentation
         * @description Bắt đầu trình chiếu, ẩn khu vực setup và hiện khu vực slide.
         */
        function startPresentation() {
            if (slideData.length === 0) {
                showSetupScreen();
                return;
            }

            setupArea.classList.add('hidden');
            presentationArea.classList.remove('hidden');
            navControls.classList.remove('hidden');
            
            slideSearchInput.value = ''; 

            renderSlide();
        }

        /**
         * @function navigate
         * @description Điều hướng đến slide tiếp theo hoặc trước đó.
         * @param {number} direction - 1 cho Next, -1 cho Previous.
         */
        function navigate(direction) {
            const newIndex = currentSlideIndex + direction;

            if (newIndex >= 0 && newIndex < slideData.length) {
                jumpToSlide(newIndex); 
            }
        }

        // Gắn các sự kiện lắng nghe
        fileUpload.addEventListener('change', handleFileUpload);
        prevButton.addEventListener('click', () => navigate(-1));
        nextButton.addEventListener('click', () => navigate(1));
        startMockButton.addEventListener('click', loadMockData);
        setupButton.addEventListener('click', showSetupScreen);
        darkModeToggle.addEventListener('click', toggleDarkMode); 
        
        // SỰ KIỆN CHO MODAL/INDEX
        indexButton.addEventListener('click', () => {
            slideSearchInput.value = '';
            renderSlideIndex(slideData); 
            slideIndexModal.classList.remove('hidden');
        });

        modalCloseButton.addEventListener('click', () => {
            slideIndexModal.classList.add('hidden');
        });

        // SỰ KIỆN CHO TÌM KIẾM
        slideSearchInput.addEventListener('keyup', filterSlides);
        
        // Khởi tạo trạng thái Dark Mode từ localStorage
        document.addEventListener('DOMContentLoaded', initializeTheme);

        // Khởi tạo: Hiển thị màn hình setup lúc đầu (do slideData rỗng)
        document.addEventListener('DOMContentLoaded', showSetupScreen);

    </script>

</body>
