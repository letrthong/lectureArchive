<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Images with Tailwind</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configure Tailwind for the Inter font -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <h1 class="text-3xl font-bold text-gray-800">Dynamic Image Viewer</h1>
    <p class="text-lg text-gray-600 mt-2">The function now displays explanatory text above the 2x2 image grid.</p>

    <!-- Target container for the images. Note: The layout classes here are generic and will be updated by the JS function -->
    <div id="id_slide" class="w-full max-w-4xl gap-4 rounded-xl shadow-lg">
        <!-- The images and explanatory text will be inserted here by the JavaScript function -->
        <p id="loading-message" class="text-gray-500 italic">Inserting images...</p>
    </div>

    <script>
        /**
         * Function to dynamically create and insert explanatory text and images into the target container.
         * This version is limited to processing and displaying only the first four images (2x2 grid).
         * @param {string} containerId - The ID of the target HTML element.
         * @param {string} contentText - The explanatory text to display above the images.
         * @param {string[]} imageList - An array of URLs for the images to insert.
         */
        function addImages(containerId, contentText, imageList) {
            const container = document.getElementById(containerId);

            if (!container) {
                console.error(`Container with ID '${containerId}' not found.`);
                return;
            }

            // Xóa toàn bộ nội dung cũ của container
            container.innerHTML = '';
            
            // Cập nhật các class của container (sẽ áp dụng cho cả văn bản và hình ảnh)
            container.classList.add(
                'grid', 'grid-cols-2', 'gap-4', 'rounded-xl', 'shadow-lg', 'p-4', 'bg-white', 'mt-8' 
            );

            // 1. Tạo và chèn nội dung giải thích (contentText)
            if (contentText) {
                const textElement = document.createElement('h3');
                textElement.textContent = contentText;
                
                // Sử dụng col-span-2 để đảm bảo văn bản chiếm toàn bộ chiều rộng (2 cột)
                textElement.className = 'text-xl font-semibold text-gray-700 col-span-2 mb-4 text-center border-b pb-2'; 
                container.appendChild(textElement);
            }

            // Lặp qua danh sách URL hình ảnh, giới hạn chỉ lấy 4 phần tử đầu tiên (2x2 grid)
            imageList.slice(0, 4).forEach((srcUrl, index) => {
                const newImage = document.createElement('img');
                
                newImage.src = srcUrl;
                newImage.alt = `Dynamic image ${index + 1}`;
                
                // Fallback URL nếu hình ảnh không load được
                newImage.onerror = () => newImage.src = `https://placehold.co/400x300/FCA5A5/DC2626?text=Error+Loading+Image+${index + 1}`;

                // Tailwind classes: w-full đảm bảo hình ảnh lấp đầy ô grid của nó.
                newImage.className = 'w-full h-auto object-cover rounded-xl shadow-xl transition-transform duration-300 hover:scale-[1.03] cursor-pointer';

                container.appendChild(newImage);
            });
        }

        // --- DEMO CALL ---
        const slideId = 'id_slide';
        // Định nghĩa nội dung văn bản giải thích
        var contentText = 'Đây là nội dung giải thích cho 4 hình ảnh dưới đây, được hiển thị theo bố cục 2x2.';
        contentText = contentText + contentText;
        contentText = contentText + contentText;
        // Danh sách Placeholder URLs 
         const imageList = [
            'https://placehold.co/400x300/4F46E5/ffffff?text=Image+1+(Used)',
            'https://placehold.co/400x300/10B981/ffffff?text=Image+2+(Used)',
            'https://placehold.co/400x300/EF4444/ffffff?text=Image+3+(Used)',
            'https://placehold.co/400x300/F59E0B/ffffff?text=Image+4+(Used)' 
        ];


        // Gọi hàm với các tham số mới (ID, Nội dung giải thích, và danh sách URL)
        addImages(slideId, contentText, imageList);
    </script>

</body>
</html>
