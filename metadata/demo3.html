<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Images with Tailwind</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configure Tailwind for the Inter font -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <h1 class="text-3xl font-bold text-gray-800">Dynamic Presentation Slide Viewer</h1>
    <p class="text-lg text-gray-600 mt-2">Bố cục slide thuyết trình đã được cập nhật: Hai ảnh song song, mỗi ảnh có mô tả riêng.</p>

    <!-- Target container for the slide content -->
    <div id="id_slide" class="w-full max-w-5xl">
        <!-- Content will be inserted by the JavaScript function -->
        <p class="text-gray-500 italic p-4">Loading slide content...</p>
    </div>

    <script>
        /**
         * Function to dynamically create a presentation slide-style layout:
         * Two images side-by-side (with captions), and Notes/Context below.
         * * @param {string} containerId - The ID of the target HTML element.
         * @param {Array<Object>} slidesData - Array of objects [{imageUrl: string, caption: string}] for the main content.
         * @param {string} notesText - Text content (can include HTML tags) for the notes/contextual box at the bottom.
         */
        function addImages(containerId, slidesData, notesText) {
            const container = document.getElementById(containerId);

            if (!container) {
                console.error(`Container with ID '${containerId}' not found.`);
                return;
            }

            // Xóa toàn bộ nội dung cũ của container
            container.innerHTML = '';
            
            // Cập nhật các class của container để tạo khung slide chuyên nghiệp
            container.classList.remove('grid', 'grid-cols-2'); // Xóa lớp grid cũ nếu có
            container.classList.add(
                'flex', 'flex-col', 'gap-8', 'rounded-xl', 'shadow-2xl', 'p-8', 'bg-white', 'mt-8', 'border', 'border-gray-100'
            );

            // --- 1. Tạo khối chứa Nội dung Chính (Hai Ảnh song song) ---
            const mainContentDiv = document.createElement('div');
            // Sử dụng Grid 2 cột cho hai hình ảnh
            // Stacks on mobile (grid-cols-1) and goes side-by-side on desktop (md:grid-cols-2)
            mainContentDiv.className = 'grid grid-cols-1 md:grid-cols-2 gap-10 items-start justify-items-center';
            
            // Lặp qua dữ liệu hình ảnh
            slidesData.slice(0, 2).forEach(data => { // Giới hạn chỉ hiển thị 2 hình ảnh
                const itemDiv = document.createElement('div');
                itemDiv.className = 'flex flex-col items-center text-center space-y-4 w-full';

                // 1a. Chèn Image
                const imageElement = document.createElement('img');
                imageElement.src = data.imageUrl;
                imageElement.alt = 'Slide Image';
                
                // Fallback URL nếu hình ảnh không load được
                imageElement.onerror = () => imageElement.src = `https://placehold.co/450x300/FCA5A5/DC2626?text=Image+Error`;
                
                // Kích thước hình ảnh
                imageElement.className = 'w-full h-auto object-cover rounded-lg shadow-xl max-w-sm';
                
                // 1b. Chèn Text/Caption (dưới hình ảnh)
                const captionDiv = document.createElement('div');
                captionDiv.className = 'text-gray-800 text-sm md:text-base font-medium space-y-1';
                captionDiv.innerHTML = data.caption;
                
                itemDiv.appendChild(imageElement);
                itemDiv.appendChild(captionDiv);
                mainContentDiv.appendChild(itemDiv);
            });

            container.appendChild(mainContentDiv);

            // --- 2. Chèn Notes/Context (Dưới) ---
            if (notesText) {
                const notesDiv = document.createElement('div');
                // Tạo phong cách box Ghi chú/Context (giống hộp màu xanh lá cây)
                notesDiv.className = 'mt-4 p-6 rounded-lg bg-green-50 border-l-4 border-green-500 shadow-inner';
                
                const notesTitle = document.createElement('p');
                notesTitle.textContent = 'Ghi chú / Ngữ cảnh:';
                notesTitle.className = 'font-bold text-green-700 mb-2';
                
                const notesContent = document.createElement('div');
                notesContent.className = 'text-gray-700 text-sm leading-relaxed';
                notesContent.innerHTML = notesText;

                notesDiv.appendChild(notesTitle);
                notesDiv.appendChild(notesContent);
                container.appendChild(notesDiv);
            }
        }

        // --- HÀM HỖ TRỢ: Tạo nhanh cấu trúc dữ liệu slidesData ---
        function createSlideData(imageUrl, contentText) {
            return {
                imageUrl: imageUrl,
                caption: contentText
            };
        }


        // --- DEMO CALL ---
        const slideId = 'id_slide';
        
        // --- Cập nhật dữ liệu để dễ dàng tạo 2 slide theo yêu cầu mới ---
        
        // Slide 1 (Giữ nguyên)
        const imageLeftUrl = 'https://placehold.co/450x300/3B82F6/ffffff?text=EU+Delivery+Van';
        const contentLeft = `
            <p class="text-xl font-bold mt-2">EU Region - Logistics</p>
            <p>Manufacturer: <strong class="text-black">Mercedes-Benz</strong></p>
            <p>Vehicle Model: <strong class="text-black">Sprinter 519</strong></p>
            <p>Year of manufacturing: 2023</p>
        `;

        // Slide 2 (Dữ liệu đã được cập nhật)
        const imageRightUrl = 'https://placehold.co/450x300/F59E0B/ffffff?text=NA+Heavy+Hauler';
        const contentRight = `
            <p class="text-xl font-bold mt-2">NA Region - Heavy Duty</p>
            <p>Manufacturer: <strong class="text-black">Kenworth</strong></p>
            <p>Vehicle Model: <strong class="text-black">W990 Classic</strong></p>
            <p>Year of manufacturing: 2024</p>
        `;

        // Tạo mảng slidesData từ các biến trên
        const slidesData = [
            createSlideData(imageLeftUrl, contentLeft),
            createSlideData(imageRightUrl, contentRight)
        ];

        // Nội dung Ghi chú/Context (phần box dưới cùng)
        const notesText = `
            <p>Sự khác biệt về mẫu xe phản ánh nhu cầu và quy định giao thông khác nhau giữa các khu vực Châu Âu (EU) và Bắc Mỹ (NA). 
            Các thông số kỹ thuật chính (nhà sản xuất, mẫu xe, năm sản xuất) là dữ liệu quan trọng để theo dõi.</p>
        `;

        // Gọi hàm với các tham số mới: ID, Danh sách dữ liệu Slides, và Ghi chú
        addImages(slideId, slidesData, notesText);
    </script>

</body>
</html>
